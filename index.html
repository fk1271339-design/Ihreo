<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="IHREO - Iconic Human Rights & Educational Organization. Empowering communities through education and human rights advocacy.">
    <link rel="icon" type="image/png" href="images/new_favicon.png">
    <title>IHREO - Home</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Quick redirect styles */
        body.redirecting {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        .redirect-message {
            text-align: center;
            color: white;
        }

        .redirect-message h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: fadeIn 0.5s;
        }

        .redirect-message p {
            font-size: 1.2rem;
            opacity: 0.9;
            animation: fadeIn 0.7s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="redirecting">
    <div class="redirect-message">
        <h1>🌟 Welcome to IHREO</h1>
        <p>Redirecting you to our home page...</p>
        <div class="spinner"></div>
    </div>

    <script>
        // Automatic redirect to home page
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 1500);
    </script>
</body>

</html>
