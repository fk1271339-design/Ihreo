<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Panel - ICONIC HUMAN RIGHTS & EDUCATIONAL ORGANIZATION">
    <title>Admin Panel - IHREO</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink' width='32' height='32'%3E%3Cdefs%3E%3CclipPath id='circle'%3E%3Ccircle cx='16' cy='16' r='14'/%3E%3C/clipPath%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='white' stroke='%231e40af' stroke-width='2'/%3E%3Cimage href='images/ihreo-logo-transparent.png' x='2' y='2' width='28' height='28' clip-path='url(%23circle)'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="CSS/admin-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Description Modal Popup */
        .description-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            animation: fadeIn 0.3s;
        }

        .description-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            margin: 0;
            color: #1e3c72;
            font-size: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #666;
            line-height: 1;
        }

        .modal-close:hover {
            color: #ef4444;
        }

        .modal-body {
            margin-bottom: 1.5rem;
        }

        .modal-body label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2a5298;
            font-weight: 600;
        }

        .modal-body textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
        }

        .modal-body textarea:focus {
            outline: none;
            border-color: #2a5298;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-cancel {
            background: #e0e0e0;
            color: #666;
        }

        .modal-btn-cancel:hover {
            background: #ccc;
        }

        .modal-btn-submit {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .modal-btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 82, 152, 0.3);
        }
    </style>
</head>

<body>
    <!-- Authentication Check Script -->
    <script>
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            alert('⚠️ Please login first!');
            window.location.href = 'home.html';
        }
    </script>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-container">
                <img src="images/ihreo 2.png" alt="IHREO Logo" class="logo">
                <span class="logo-text">IHREO Admin</span>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html" class="nav-link">← Back to Website</a></li>
                <li><a href="#" class="nav-link" id="logoutBtn" style="color: #ef4444; font-weight: 600;">🚪 Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Admin Panel -->
    <section class="admin-section">
        <div class="container">
            <div class="admin-header">
                <h1>Admin Panel</h1>
                <p>Manage website content and messages</p>
            </div>

            <!-- Upload Section -->
            <div class="upload-section">
                <div class="upload-card">
                    <h2>📷 Upload Photos</h2>
                    <div class="upload-area" id="photoUploadArea">
                        <div class="upload-icon">📁</div>
                        <p>Click to select photos or drag and drop</p>
                        <input type="file" id="photoInput" accept="image/*" multiple hidden>
                    </div>
                    <button class="btn btn-primary" id="uploadPhotoBtn">Upload Photos</button>
                </div>

                <div class="upload-card">
                    <h2>🎥 Upload Videos</h2>
                    <div class="upload-area" id="videoUploadArea">
                        <div class="upload-icon">📁</div>
                        <p>Click to select videos or drag and drop</p>
                        <input type="file" id="videoInput" accept="video/*" multiple hidden>
                    </div>
                    <button class="btn btn-primary" id="uploadVideoBtn">Upload Videos</button>
                </div>
            </div>

            <!-- Preview Section -->
            <div class="preview-section">
                <h2>Preview & Manage</h2>
                <div class="preview-tabs">
                    <button class="tab-btn active" data-tab="photos">📷 Photos</button>
                    <button class="tab-btn" data-tab="videos">🎥 Videos</button>
                    <button class="tab-btn" data-tab="messages">📧 Messages</button>
                </div>

                <div class="tab-content active" id="photosTab">
                    <div class="preview-grid" id="photosPreview">
                        <!-- Photos will be displayed here -->
                    </div>
                </div>

                <div class="tab-content" id="videosTab">
                    <div class="preview-grid" id="videosPreview">
                        <!-- Videos will be displayed here -->
                    </div>
                </div>

                <div class="tab-content" id="messagesTab">
                    <div class="messages-list" id="messagesList">
                        <!-- Contact messages will be displayed here -->
                    </div>
                </div>
            </div>

            <!-- Statistics -->
            <div class="admin-stats">
                <div class="stat-box">
                    <div class="stat-icon">📷</div>
                    <div class="stat-info">
                        <div class="stat-value" id="photoCount">0</div>
                        <div class="stat-label">Photos</div>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">🎥</div>
                    <div class="stat-info">
                        <div class="stat-value" id="videoCount">0</div>
                        <div class="stat-label">Videos</div>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">Total Items</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Description Modal -->
    <div class="description-modal" id="descriptionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📝 Add Description</h3>
                <button class="modal-close" onclick="closeDescriptionModal()">×</button>
            </div>
            <div class="modal-body">
                <label for="descriptionText">Description (Optional):</label>
                <textarea id="descriptionText" placeholder="Enter a description for this file..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" onclick="cancelDescription()">Skip</button>
                <button class="modal-btn modal-btn-submit" onclick="submitDescription()">Add & Upload</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="js/admin-script.js"></script>
    <script>
        // Logout functionality
        document.addEventListener('DOMContentLoaded', () => {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (confirm('Are you sure you want to logout?')) {
                        sessionStorage.removeItem('adminLoggedIn');
                        window.location.href = 'home.html';
                    }
                });
            }
        });
    </script>
</body>

</html>
